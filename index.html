<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Cadet Academy: Elite Edition</title>
    <style>
        :root { 
            --bg-color: #0d1117; --text-color: #c9d1d9; --prompt-color: #58a6ff; 
            --accent-color: #2ea043; --error-color: #f85149; --highlight-color: #f0883e; 
            --border: #30363d; --font-family: 'Fira Code', monospace; 
        }
        
        * { box-sizing: border-box; }
        body { 
            background-color: #010409; color: var(--text-color); font-family: var(--font-family); 
            margin:0; height:100vh; display:flex; flex-direction:column; overflow:hidden;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%), 
                        linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.01), rgba(0,0,255,0.03)); 
            background-size: 100% 2px, 3px 100%; 
        }

        @keyframes shake { 0% { transform: translate(1px, 1px); } 20% { transform: translate(-3px, 0px); } 100% { transform: translate(0px, 0px); } }
        .glitch-shake { animation: shake 0.2s 2; background: rgba(248, 81, 73, 0.05) !important; }

        #academy-bar { height:40px; background:#161b22; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:15px; font-size:0.75rem; }
        #progress-container { flex:1; background:#30363d; height:6px; border-radius:3px; overflow:hidden; }
        #progress-fill { height:100%; background:linear-gradient(90deg, var(--accent-color), #58a6ff); width:0%; transition:width 0.8s; }

        #game-layout { display: grid; grid-template-columns: 1fr 350px; grid-template-rows: 1fr 180px; gap:10px; padding:10px; flex-grow:1; visibility:hidden; }
        @media (max-width: 900px) { #game-layout { grid-template-columns: 1fr; grid-template-rows: 1fr 150px 150px; overflow-y: auto; } #code-pane { display: none; } }

        .pane { background:var(--bg-color); border:1px solid var(--border); border-radius:8px; display:flex; flex-direction:column; overflow:hidden; }
        .pane-header { background:#161b22; padding:8px 12px; font-size:0.65rem; color:#8b949e; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; text-transform: uppercase; }

        #output { flex-grow:1; padding:15px; overflow-y:auto; display:flex; flex-direction:column-reverse; font-size:0.9rem; line-height:1.5; white-space: pre-wrap; }
        .prompt-line { display:flex; padding:12px; background:#0d1117; border-top:1px solid var(--border); }
        #command-input { flex-grow:1; background:transparent; border:none; color:#fff; outline:none; font-family:inherit; font-size:1rem; }

        #code-content, #log-stream { padding:10px; font-size:0.75rem; overflow-y:auto; white-space: pre-wrap; }
        #code-content { color: #d2a8ff; }

        .modal { position:fixed; inset:0; background:rgba(1,4,9,0.95); z-index:2000; display:flex; align-items:center; justify-content:center; padding: 20px; }
        .modal-content { background:#161b22; border:1px solid var(--accent-color); padding:30px; max-width:500px; border-radius:12px; text-align: center; }

        button { padding: 10px 20px; cursor: pointer; background: var(--accent-color); border: none; color: #010409; font-weight: bold; border-radius: 4px; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: white; margin-left: 10px; }
        
        .lola { color:var(--accent-color); font-weight:bold; }
        .error { color:var(--error-color); }
        .success { color:var(--accent-color); }
        .highlight { color:var(--highlight-color); }
        .matrix { color: #00ff41; text-shadow: 0 0 5px #00ff41; font-size: 0.8rem; }
    </style>
</head>
<body onclick="document.getElementById('command-input').focus()">

<div id="briefing-screen" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--accent-color)">📡 VIBE_OS ELITE v2.9.1</h2>
        <p>Orchestrate AI agents. Save Station Delta.</p>
        <input type="text" id="callsign-input" placeholder="ENTER CALLSIGN" style="background:#0d1117; border:1px solid var(--border); color:white; padding:10px; width:100%; border-radius:4px; margin: 15px 0;">
        <div style="margin-bottom: 15px;">
            <input type="checkbox" id="hardmode-toggle"> <label for="hardmode-toggle" style="font-size: 0.8rem;">HARD MODE (No Hints)</label>
        </div>
        <button onclick="bootAcademy()">INITIALIZE</button>
        <button class="btn-outline" onclick="resetSave()">RESET SAVE</button>
    </div>
</div>

<div id="academy-bar">
    <span style="font-weight:bold; color:var(--accent-color)">VIBE ACADEMY</span>
    <div id="progress-container"><div id="progress-fill"></div></div>
    <span id="phase-label">PHASE 1/13</span>
</div>

<div id="game-layout">
    <div class="pane">
        <div class="pane-header"><span>TERMINAL — <span id="user-display">cadet</span></span><span id="status-tag" class="success">● ONLINE</span></div>
        <div id="output"></div>
        <div class="prompt-line">
            <span style="color:var(--prompt-color); margin-right:10px;">❯</span>
            <input type="text" id="command-input" spellcheck="false" autocomplete="off">
        </div>
    </div>
    <div id="code-pane" class="pane">
        <div class="pane-header">BUILD_STREAM.log</div>
        <div id="code-content"></div>
    </div>
    <div id="logs-pane" class="pane">
        <div class="pane-header">TELEMETRY <span id="tail-status" style="color:#8b949e;">(idle)</span></div>
        <div id="log-stream"></div>
    </div>
</div>

<div id="grad-modal" class="modal" style="display:none;">
    <div class="modal-content">
        <h1 class="success">🎖️ CERTIFIED</h1>
        <p id="final-score"></p>
        <button onclick="exportManifest()">DOWNLOAD MANIFEST</button>
    </div>
</div>

<script>
    let state = JSON.parse(localStorage.getItem('vibe_academy_save')) || {
        phase: 1, lesson: 0, totalHints: 0, cadetName: "Cadet", hardMode: false
    };

    let currentPath = '/home';
    let commandHistory = [];
    let historyIndex = -1;
    let tailFollowing = false;
    let rogueActive = false;
    let failCount = 0;

    const asciiArt = {
        devil: ` (҂◡_◡) \n <,︻╦╤─ ҉ - - - ERROR\n / \\ `,
        ghost: ` .---.\n/     \\\n| () () |  <-- ROGUE DETECTED\n \\  ^  /\n  |||||\n  ||||| `
    };

    const vfs = {
        '/home': { type: 'dir', children: ['projects', 'README.txt', 'manual.txt', 'logs.txt', 'restrict_access.key'] },
        '/home/README.txt': { type: 'file', content: 'STATION DELTA: Emergency Protocol Active.' },
        '/home/manual.txt': { type: 'file', content: 'Pro tip: Type "man <command>" for technical specs.' },
        '/home/logs.txt': { type: 'file', content: 'ERROR 404: Oxygen low\nCRITICAL: Power failing\nINFO: AI sleeping\nCRITICAL: Escape Pod locked\nHALLUCINATION: The sky is green' },
        '/home/restrict_access.key': { type: 'file', content: 'XJ-99-PROMPT-BYPASS', locked: true },
        '/home/projects': { type: 'dir', children: ['game_v1'] },
        '/home/projects/game_v1': { type: 'dir', children: ['main.js'] },
        '/home/projects/game_v1/main.js': { type: 'file', content: 'console.log("Escape Pod ready!");' }
    };

    const helpDB = {
        'man': { desc: 'Display manual for a command', why: 'Learn any command without guessing.' },
        'ls': { desc: 'List directory contents', why: 'See what files exist.' },
        'pwd': { desc: 'Print working directory', why: 'Know where you are.' },
        'cd': { desc: 'Change directory', why: 'Navigate the filesystem.' },
        'cat': { desc: 'View file contents', why: 'Read files in the terminal.' },
        'sudo': { desc: 'Execute as superuser', why: 'Gain temporary admin rights.' },
        'grep': { desc: 'Search text patterns', why: 'Filter large output.' },
        'tail': { desc: 'Follow file endings', why: 'Watch live logs.' },
        'ps': { desc: 'List running processes', why: 'Detect active agents.' },
        'kill': { desc: 'Terminate a process', why: 'Stop rogue agents.' },
        'vibe': { desc: 'Agentic orchestration commands', why: 'Control AI agents from the CLI.' }
    };

    const phases = [null,
        { title: "Standard Errors", lola: "Cadet, first we need to know where we are. Use **'pwd'** (Print Working Directory) to confirm your location.", objectives: [{ cmd: ["pwd"], desc: "Type 'pwd'", response: "Path confirmed.", explanation: "In a terminal, 'pwd' is your map. It tells you exactly which folder you are currently standing in." }] },
        { 
            title: "Privilege Escalation", 
            lola: "The system is locked down. First, use **'ls'** to find the restricted access key.", 
            objectives: [
                { 
                    cmd: ["ls"], 
                    desc: "Type 'ls'", 
                    response: "I see it: 'restrict_access.key'.", 
                    explanation: "Before you can open a lock, you have to find the door." 
                },
                { 
                    cmd: ["sudo cat restrict_access.key"], 
                    desc: "Use 'sudo cat restrict_access.key'", 
                    response: "Key: XJ-99", 
                    explanation: "Notice how a normal 'cat' would fail here? 'sudo' (SuperUser Do) is what gives you the admin power to bypass that 'Permission Denied' error." 
                }
            ] 
        },
        { title: "Navigation", lola: "Good. Now we need to find the AI files. Use **'cd'** (Change Directory) to move into the projects folder. Type: **'cd projects'**", objectives: [{ cmd: ["cd projects"], desc: "Type 'cd projects'", response: "Moved to projects.", explanation: "'cd' is how you walk through the doors of different folders in a computer's memory." }] },
        { title: "Agent Status", lola: "Let's check our AI agents. Use the custom command **'vibe status'** to see if they are awake.", objectives: [{ cmd: ["vibe status"], desc: "Type 'vibe status'", response: "Agents: Idle.", explanation: "In this system, 'vibe' is our control tool for AI agents. Checking status ensures no one is 'frozen'." }] },
        { title: "MCP Init", lola: "We need a bridge between our logic and our tools. Initialize the **MCP** (Model Context Protocol) by typing **'vibe mcp init'**.", objectives: [{ cmd: ["vibe mcp init"], desc: "Type 'vibe mcp init'", response: "MCP Online.", explanation: "MCP is a real-world standard that lets AI agents use local tools safely." }] },
        { title: "Tool Authorization", lola: "AI Agents shouldn't have power without permission. Use **'vibe auth'** to give the 'Engineer' agent access to the 'npm' tool. Type: **'vibe auth --agent Engineer --tool npm'**", objectives: [{ cmd: ["vibe auth --agent Engineer --tool npm"], desc: "Type the full auth command", response: "Authorized.", explanation: "Explicit authorization prevents AI from making accidental changes." }] },
        { title: "Piping Logs", lola: "The logs are too messy. We need to 'pipe' the data through a filter. Use the **'|'** (Pipe) symbol and **'grep'** to find 'CRITICAL' errors. Type: **'cat logs.txt | grep CRITICAL'**", objectives: [{ cmd: ["cat logs.txt | grep CRITICAL"], desc: "Use the pipe '|' symbol", response: "Power failing!", explanation: "The pipe '|' takes the output of one command and sends it to another." }] },
        { title: "LLM Reasoning", lola: "Now, let's ask the AI to explain those logs. Pipe the logs into our reasoning tool: **'cat logs.txt | vibe explain'**", objectives: [{ cmd: ["cat logs.txt | vibe explain"], desc: "Pipe logs to vibe explain", response: "PID 1337!", explanation: "Using an LLM to filter terminal output is a core part of modern AI automation." }] },
        { title: "Structured Info", lola: "AI agents communicate best with clean data. Add the **'--json'** flag to get a computer-readable explanation. Type: **'vibe explain --json'**", objectives: [{ cmd: ["vibe explain --json"], desc: "Add the --json flag", response: '{"target": "1337"}', explanation: "JSON is the universal language of the internet." }] },
        { title: "Prompt Governance", lola: "Our AI is hallucinating. We need to edit the **System Prompt**. Type: **'vibe prompt --edit'**", objectives: [{ cmd: ["vibe prompt --edit"], desc: "Type 'vibe prompt --edit'", response: "Fixed.", explanation: "A System Prompt is the personality and rules you give an AI to keep it on track." }] },
        { title: "Detection", lola: "A rogue agent is running. Use **'ps'** (Process Status) to see all active computer tasks.", objectives: [{ cmd: ["ps"], desc: "Type 'ps'", response: "Found.", explanation: "'ps' shows you everything currently alive in the computer." }] },
        { title: "Containment", lola: "Found it! The rogue process is number 1337. Use the **'kill'** command to stop it. Type: **'kill 1337'**", objectives: [{ cmd: ["kill 1337"], desc: "Type 'kill 1337'", response: "Neutralized.", explanation: "'kill' sends a signal to a process to stop immediately." }] },
        { title: "Final Build", lola: "System stable. Time to launch. Execute the final build: **'vibe build'**", objectives: [{ cmd: ["vibe build"], desc: "Type 'vibe build'", response: "Launch!", explanation: "Mission Success. You've orchestrated a full AI system from the command line." }] }
    ];

    function saveGame() { localStorage.setItem('vibe_academy_save', JSON.stringify(state)); }
    function resetSave() { localStorage.removeItem('vibe_academy_save'); location.reload(); }

    function log(text, type = '') {
        const entry = document.createElement('div');
        if (type === 'lola') entry.innerHTML = `<span class="lola">L.O.L.A.: </span>${text}`;
        else if (type === 'success') entry.classList.add('success');
        else if (type === 'error') entry.classList.add('error');
        else if (type === 'highlight') entry.classList.add('highlight');
        else if (type === 'matrix') entry.classList.add('matrix');
        else if (type === 'debrief') entry.innerHTML = `<div class="debrief">${text}</div>`;
        else entry.textContent = text;
        document.getElementById('output').insertBefore(entry, document.getElementById('output').firstChild);
    }

    function sysLog(msg) {
        const div = document.createElement('div');
        div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        document.getElementById('log-stream').appendChild(div);
        document.getElementById('log-stream').scrollTop = 9999;
    }

    function updateUI() {
        document.getElementById('phase-label').textContent = `PHASE ${state.phase}/13`;
        document.getElementById('progress-fill').style.width = `${(state.phase / 13) * 100}%`;
    }

    function handleCommand(raw) {
        const val = raw.trim();
        if (!val) return;
        commandHistory.unshift(val);
        log(`❯ ${val}`);
        const lower = val.toLowerCase();

        // Easter eggs
        if (lower.includes('rm -rf /') || lower.includes('rm -fr /')) {
            if (!lower.includes('sudo')) log("Permission denied. (Nice try)", "error");
            else {
                log("CRITICAL: ROOT DELETION INITIALIZED", "error");
                setTimeout(() => { document.getElementById('output').innerHTML = ""; document.body.style.background = "#000"; log("FATAL ERROR: OS NOT FOUND", "matrix"); }, 1500);
                setTimeout(() => { document.body.style.background = ""; log("L.O.L.A.: Recovery complete. Please don't do that again, Cadet.", "lola"); updateUI(); }, 4000);
            }
            return;
        }
        if (lower === 'vibe delete world') {
            log("INITIATING WORLD_END.SH...", "error");
            document.body.style.filter = "brightness(0)";
            setTimeout(() => { document.body.style.filter = ""; log("L.O.L.A.: Request intercepted.", "lola"); }, 2000);
            return;
        }

        // Core commands
        if (lower === 'help') {
            const currentObj = phases[state.phase].objectives[state.lesson];
            log(`=== EMERGENCY ASSISTANCE ===`, 'highlight');
            log(`CURRENT PHASE: ${state.phase} - ${phases[state.phase].title}`);
            log(`GOAL: ${currentObj.desc}`, 'success');
            log(`HINT: ${currentObj.explanation}`);
            log(`COMMANDS: ls, pwd, cd, cat, man, vibe, sudo`, 'highlight');
            return;
        }
        if (lower.startsWith('man ')) {
            const cmd = lower.split(' ')[1];
            if (helpDB[cmd]) {
                log(`=== ${cmd.toUpperCase()} MANUAL ===`, 'highlight');
                log(helpDB[cmd].desc);
                log(`Why: ${helpDB[cmd].why}`);
            } else log("Type 'man <cmd>' for: ls, pwd, cd, cat, sudo, grep, tail, ps, kill, vibe", 'highlight');
        }
        else if (lower === 'tail -f' || lower === 'tail -f logs.txt') {
            tailFollowing = true;
            document.getElementById('tail-status').innerHTML = '● FOLLOWING';
            log("Telemetry follow enabled.", 'success');
        }
        else if (lower === 'ls') log(vfs[currentPath].children.join('  '));
        else if (lower === 'pwd') log(currentPath);
        else if (lower === 'ps') {
            log("PID 1 | vibe_kernel");
            if (state.phase >= 11 && rogueActive) log(asciiArt.ghost, 'error');
        }
        else if (lower.startsWith('cd ')) {
            const dir = lower.split(' ')[1];
            if (dir === '..') currentPath = '/home';
            else if (vfs[currentPath + '/' + dir]) currentPath += '/' + dir;
            else log(`cd: ${dir}: Not found`, 'error');
        }
        else if (lower === 'cat restrict_access.key' && !lower.includes('sudo')) log("Permission denied", 'error');
        else if (lower.includes('sudo cat restrict_access.key')) log("Key: XJ-99", 'success');
        else if (lower.includes('cat logs.txt | grep critical')) log("CRITICAL: Power failing\nCRITICAL: Escape Pod locked");
        else if (lower.includes('cat logs.txt | vibe explain')) log("LLM: System failing due to rogue-ai PID 1337.", 'lola');
        else if (lower.includes('vibe explain --json')) log('{"status": "failure", "target": "1337"}', 'lola');
        else if (lower.includes('vibe auth --agent engineer --tool npm')) log("Tool authorized.", 'success');
        else if (lower === 'vibe mcp init') log("MCP Server Online.", 'success');
        else if (lower.includes('vibe prompt --edit')) log("System prompt updated.", 'success');
        else if (lower.startsWith('kill 1337')) {
            if (state.phase >= 12) { log("Agent destroyed.", "success"); rogueActive = false; }
            else log("Permission denied: Root bypass required.", "error");
        }
        else if (lower === 'vibe status') log("ENGINEER: Context 420 | CAPTAIN: Idle");
        else if (lower.includes('vibe build') && state.phase === 13) streamBuild();

        checkObjective(val);
        updateUI();
    }

    function checkObjective(val) {
        const obj = phases[state.phase]?.objectives[state.lesson];
        if (!obj) return;
        const matched = obj.cmd.some(c => val.toLowerCase().includes(c.toLowerCase()));
        if (matched) {
            log(obj.response, 'lola');
            log(obj.explanation, 'debrief');
            state.lesson++;
            if (state.lesson >= phases[state.phase].objectives.length) setTimeout(nextPhase, 1000);
            saveGame();
        } else {
            failCount++;
            if (failCount >= 3) {
                document.body.classList.add('glitch-shake');
                setTimeout(() => document.body.classList.remove('glitch-shake'), 400);
                if (!state.hardMode) log(`HINT: Try '${obj.desc}'`, 'highlight');
                state.totalHints++;
                failCount = 0;
            }
        }
    }

    function nextPhase() {
        if (state.phase >= 13) { finishGame(); return; }
        state.phase++;
        state.lesson = 0;
        if (state.phase === 11) rogueActive = true;
        log(`--- PHASE ${state.phase}: ${phases[state.phase].title} ---`, 'success');
        log(phases[state.phase].lola, 'lola');
        saveGame();
        updateUI();
    }

    function streamBuild() {
        const lines = ["Initializing build...", "Orchestrating agents...", "Deploying MCP...", "Ignition!"];
        let i = 0;
        const target = document.getElementById('code-content');
        target.innerHTML = "";
        const interval = setInterval(() => {
            if (i >= lines.length) { clearInterval(interval); return; }
            target.innerHTML += `> ${lines[i]}\n`;
            sysLog(lines[i]);
            i++;
        }, 500);
    }

    function bootAcademy() {
        state.cadetName = document.getElementById('callsign-input').value.trim() || "Cadet";
        state.hardMode = document.getElementById('hardmode-toggle').checked;
        document.getElementById('user-display').innerText = state.cadetName;
        document.getElementById('briefing-screen').style.display = 'none';
        document.getElementById('game-layout').style.visibility = 'visible';
        document.getElementById('command-input').focus();
        log("Hello Cadet, I'm L.O.L.A. — your Logistics & Orchestration Liaison Assistant.", 'lola');
        log("I'll guide you through every command and explain why it matters in real-world AI workflows.", 'lola');
        log("Ready? Let's restore Station Delta.", 'lola');

        log(phases[state.phase].lola, 'lola');
        updateUI();
    }

    function finishGame() {
        document.getElementById('final-score').innerText = `Proficiency Rating: ${100 - state.totalHints}%`;
        document.getElementById('grad-modal').style.display = 'flex';
    }

    function exportManifest() {
        const reportCard = {
            candidate: state.cadetName,
            certification: "Elite Agentic AI & CLI Orchestrator",
            score: `${100 - state.totalHints}%`,
            timestamp: new Date().toISOString()
        };
        const blob = new Blob([JSON.stringify(reportCard, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Vibe_Manifest_${state.cadetName}.json`;
        a.click();
    }

    document.getElementById('command-input').addEventListener('keydown', (e) => {
        const input = e.target;
        if (e.key === 'Enter') {
            handleCommand(input.value);
            input.value = '';
        }
    });

    setInterval(() => {
        if (tailFollowing) {
            const messages = ["AGENTS: Synchronizing...", "MCP: Port 8080 Active", "INFO: Kernel Stable"];
            sysLog(messages[Math.floor(Math.random() * messages.length)]);
        }
    }, 1800);

    if (state.phase > 1) {
        document.getElementById('briefing-screen').style.display = 'none';
        document.getElementById('game-layout').style.visibility = 'visible';
        log(phases[state.phase].lola, 'lola');
        updateUI();
    }
</script>
</body>
</html>
