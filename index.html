<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Cadet: Master Command</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --prompt-color: #58a6ff;
            --accent-color: #2ea043;
            --error-color: #f85149;
            --highlight-color: #f0883e;
            --agent-color: #bc8cff;
            --font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #010409;
            color: var(--text-color);
            font-family: var(--font-family);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            grid-template-rows: 1fr 180px;
            gap: 10px;
            height: 100%;
        }

        .pane {
            background: var(--bg-color);
            border: 1px solid #30363d;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .pane-header {
            background: #161b22;
            padding: 6px 12px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #30363d;
            color: #8b949e;
            display: flex;
            justify-content: space-between;
        }

        /* Main Terminal */
        #main-terminal { grid-row: 1 / 2; grid-column: 1 / 2; }
        #output { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column-reverse; }

        /* Agent Sidebar */
        #agent-pane { grid-row: 1 / 3; grid-column: 2 / 3; transition: opacity 0.5s; }
        #agent-list { padding: 10px; font-size: 0.85rem; }
        .agent-card {
            border: 1px solid #30363d;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            background: #161b22;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* System Logs */
        #logs-pane { grid-row: 2 / 3; grid-column: 1 / 2; }
        #system-logs { padding: 10px; font-size: 0.8rem; color: #8b949e; overflow-y: auto; height: 100%; }

        .log-entry { margin-bottom: 6px; line-height: 1.4; white-space: pre-wrap; }
        .prompt-line { display: flex; padding: 12px; background: #161b22; border-top: 1px solid #30363d; }
        #command-input { flex-grow: 1; background: transparent; border: none; color: var(--text-color); outline: none; font-family: var(--font-family); font-size: 1rem; }
        
        #prompt-label { color: var(--prompt-color); margin-right: 8px; }
        .lola-msg { color: var(--accent-color); font-weight: bold; }
        .agent-msg { color: var(--agent-color); }
        .crit-msg { color: var(--error-color); font-weight: bold; }
        .highlight { color: var(--highlight-color); }
        .cmd-echo { color: #8b949e; }

        .hidden { opacity: 0.2; pointer-events: none; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="main-terminal" class="pane">
        <div class="pane-header">
            <span>Terminal: cadet@ss_stackoverflow</span>
            <span id="location-display">~/home</span>
        </div>
        <div id="output">
            <div id="log-anchor"></div>
        </div>
        <div class="prompt-line">
            <span id="prompt-label">cadet@vibe:~$ </span>
            <input type="text" id="command-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <div id="agent-pane" class="pane hidden">
        <div class="pane-header">Crew / AI Agents</div>
        <div id="agent-list">
            <div id="empty-agents" style="color: #484f58; font-style: italic; padding: 10px;">Crew quarters empty. Phase 4 required.</div>
        </div>
    </div>

    <div id="logs-pane" class="pane hidden">
        <div class="pane-header">Ship Systems & MCP Comms</div>
        <div id="system-logs">
            <div class="log-entry">Waiting for system initialization...</div>
        </div>
    </div>
</div>

<script>
    const output = document.getElementById('output');
    const input = document.getElementById('command-input');
    const systemLogs = document.getElementById('system-logs');
    const agentList = document.getElementById('agent-list');
    const locDisplay = document.getElementById('location-display');

    let gameState = {
        phase: 1,
        lesson: 0,
        currentPath: ['home'],
        agents: [],
        fs: { 'home': { 'projects': { 'game_v1': {} }, 'README.txt': 'Welcome to the SS StackOverflow.' } }
    };

    const story = [
        null, // Offset for 1-based indexing
        {
            title: "Phase 1: Survival",
            lola: "Welcome, Cadet. The ship is adrift. We need to navigate the local directory. Use 'eza' to see where we are.",
            objectives: [
                { cmd: 'eza', desc: "List files with 'eza'", response: "Good. You see 'projects' and 'README.txt'." },
                { cmd: 'cd projects', desc: "Enter 'projects' folder", response: "Navigated. You're moving up in the world." }
            ]
        },
        {
            title: "Phase 2: Version Control",
            lola: "If we mess up the ship's code, we need a way to go back in time. Use 'git init' inside 'game_v1'.",
            objectives: [
                { cmd: 'cd game_v1', desc: "Enter the game folder", response: "Safe inside." },
                { cmd: 'git init', desc: "Initialize Git", response: "Temporal rift opened. Progress can now be saved." }
            ]
        },
        {
            title: "Phase 3: Package Management",
            lola: "The ship's life support runs on JavaScript. We need to install dependencies using 'bun'.",
            objectives: [
                { cmd: 'bun install', desc: "Install packages", response: "Dependencies synced. Ship air quality: 88%." }
            ]
        },
        {
            title: "Phase 4: Agent Orchestration",
            lola: "Manual work is too slow. The hull is breaching. UNLOCKING AGENT PANES. Create a 'Manager' to coordinate the repairs.",
            objectives: [
                { cmd: 'vibe create --role manager --name Captain', desc: "Create a Manager Agent", response: "Captain is online. Look at the sidebar!" }
            ]
        },
        {
            title: "Phase 5: MCP & Recovery",
            lola: "Final step. Connect our agents to the Star Chart via MCP to find the way home.",
            objectives: [
                { cmd: 'mcp connect', desc: "Connect to Star Chart", response: "Coordinates found! Sector 7G. Engaging warp drive." }
            ]
        }
    ];

    function log(msg, type = 'system-msg', target = output) {
        const div = document.createElement('div');
        div.className = `log-entry ${type}`;
        if (type === 'lola-msg') div.innerHTML = `<span class="lola-msg">L.O.L.A.: </span>${msg}`;
        else div.textContent = msg;

        if (target === output) {
            target.insertBefore(div, document.getElementById('log-anchor'));
        } else {
            target.appendChild(div);
            target.scrollTop = target.scrollHeight;
        }
    }

    function processCommand(raw) {
        const val = raw.trim();
        log(`cadet@vibe:~$ ${val}`, 'cmd-echo');
        
        const phaseData = story[gameState.phase];
        const currentObj = phaseData.objectives[gameState.lesson];

        // Simulate CD
        if (val.startsWith('cd ')) {
            const dest = val.split(' ')[1];
            locDisplay.textContent = `~/home/${dest}`;
        }

        // Logic check
        if (val === currentObj.cmd || (val.startsWith('vibe create') && gameState.phase === 4)) {
            log(currentObj.response, 'lola-msg');
            
            if (gameState.phase === 4) {
                document.getElementById('agent-pane').classList.remove('hidden');
                document.getElementById('logs-pane').classList.remove('hidden');
                addAgent('Manager', 'Captain');
            }

            gameState.lesson++;
            if (gameState.lesson >= phaseData.objectives.length) {
                gameState.phase++;
                gameState.lesson = 0;
                if (gameState.phase < story.length) setTimeout(initPhase, 1000);
                else log("MISSION COMPLETE. WE ARE GOING HOME.", "highlight");
            } else {
                log(`NEXT: ${phaseData.objectives[gameState.lesson].desc}`, "highlight");
            }
        } else {
            log(`Hint: Try '${currentObj.cmd}'`, 'error-msg');
        }
    }

    function addAgent(role, name) {
        document.getElementById('empty-agents').style.display = 'none';
        const card = document.createElement('div');
        card.className = 'agent-card';
        card.innerHTML = `<strong>${name}</strong><br><small>${role}</small><br><span style="color:var(--accent-color)">● ONLINE</span>`;
        agentList.appendChild(card);
        log(`[SYSTEM] Agent ${name} assigned to Ship Logic.`, 'agent-msg', systemLogs);
    }

    function initPhase() {
        const p = story[gameState.phase];
        log(`\n=== ${p.title} ===`, 'highlight');
        log(p.lola, 'lola-msg');
        log(`OBJECTIVE: ${p.objectives[0].desc}`, 'highlight');
    }

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && input.value) {
            processCommand(input.value);
            input.value = '';
        }
    });

    log("VibeOS Booting...", 'system-msg');
    setTimeout(initPhase, 500);
</script>
</body>
</html>
