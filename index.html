<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Cadet: Terminal Trials</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --prompt-color: #58a6ff;
            --accent-color: #2ea043;
            --error-color: #f85149;
            --highlight-color: #f0883e;
            --font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #terminal-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #30363d;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #terminal-header {
            background-color: #161b22;
            padding: 5px 10px;
            border-bottom: 1px solid #30363d;
            border-radius: 6px 6px 0 0;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #8b949e;
        }

        #output {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse; /* Keeps bottom in view */
        }

        .log-entry {
            margin-bottom: 8px;
            line-height: 1.4;
            white-space: pre-wrap; /* Respects newlines */
        }

        .prompt-line {
            display: flex;
            padding: 10px 15px;
            background-color: #161b22;
            border-top: 1px solid #30363d;
        }

        #prompt-label {
            color: var(--prompt-color);
            margin-right: 10px;
            white-space: nowrap;
        }

        #command-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-family: var(--font-family);
            font-size: 1rem;
            outline: none;
        }

        /* Styling for different output types */
        .system-msg { color: var(--text-color); }
        .lola-msg { color: var(--accent-color); font-weight: bold;}
        .lola-msg::before { content: "L.O.L.A.: "; }
        .error-msg { color: var(--error-color); }
        .cmd-echo { color: #8b949e; }
        .highlight { color: var(--highlight-color); }
        .help-msg { color: #8b949e; font-style: italic;}

        /* Scrollbar styling */
        #output::-webkit-scrollbar { width: 8px; }
        #output::-webkit-scrollbar-track { background: var(--bg-color); }
        #output::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }

    </style>
</head>
<body>

<div id="terminal-container">
    <div id="terminal-header">
        <span>VibeOS v0.1 - Ship Systems</span>
        <span>Location: Herkimer Sect. / ~/home</span>
    </div>
    
    <div id="output">
        <div id="log-anchor"></div> </div>

    <div class="prompt-line">
        <span id="prompt-label">cadet@ss_stackoverflow:~$&nbsp;</span>
        <input type="text" id="command-input" autofocus autocomplete="off" spellcheck="false">
    </div>
</div>

<script>
    const output = document.getElementById('output');
    const input = document.getElementById('command-input');
    const promptLabel = document.getElementById('prompt-label');
    const logAnchor = document.getElementById('log-anchor');

    // --- The Virtual File System (A simplified mock) ---
    // Represented as a nested object. Simple strings are file contents.
    let fileSystem = {
        'home': {
            'README.txt': 'Welcome to VibeOS. If you see this, the simulation is working.',
            'projects': {
                'game_v1': {
                    'main.js': '// Game logic goes here',
                    'index.html': '<h1>My Cool Game</h1>',
                    '.git': { 'HEAD': 'ref: refs/heads/main' } // Fake git folder
                }
            },
            'downloads': {},
            '.bashrc': '# Alias definitions'
        }
    };

    let currentPath = ['home']; // Array path tracking: home/projects...
    let gameState = {
        phase: 0, // 0: Survival, 1: Git, 2: Packages...
        currentLesson: 0,
        hintsUsed: 0,
        gameComplete: false
    };

    // --- Game Content: Phase Lessons, Objectives, and L.O.L.A. dialogue ---
    const gameContent = [
        {
            // PHASE 1: Survival
            title: "Phase 1: The Digital Janitor",
            welcome: "Welcome, Vibe Cadet. I am L.O.L.A., your Logical Oversight & Linguistic Assistant. You have standard-issue neural spikes, but zero command line competence. We must fix that before the ship crashes into the Syntax Error Nebula.\n\nYou are in the 'home' directory. First, we need to know what's here. In 2026, we don't use old 'ls'. We use 'eza'.",
            objectives: [
                { cmd: 'eza', desc: "List files using 'eza'.", lola: "Good. 'eza' (or 'ls' on ancient systems) lets you see the files around you. Colorful, isn't it?" },
                { cmd: 'cd projects', desc: "Change directory into 'projects'.", lola: "Navigating! You are not stationary. Useful." },
                { cmd: 'eza', desc: "List files again inside 'projects'.", lola: "Ah, your first project: 'game_v1'. A bold name." },
                { cmd: 'mkdir new_prototype', desc: "Create a new directory.", lola: "Expanding your digital real estate. Use 'mkdir [name]'." },
                { cmd: 'touch notes.txt', desc: "Create an empty file.", lola: "A blank canvas. Or a blank file named notes.txt. Both are empty." },
                { cmd: 'cat notes.txt', desc: "Read the (empty) file.", lola: "Riveting. 'cat' prints the content. Since we just created it, it's empty." }
            ],
            wrapup: "Phase 1 Complete. You can move, list, create, and view. You are functional. But if your AI makes a mistake, how do you undo it? Time for Git."
        },
        {
            // PHASE 2: Git Basics
            title: "Phase 2: The Save-Game Architect",
            welcome: "We are moving. The AI agents we will eventually employ love making messes. We need a 'Save Game' system. We use **Git**.\n\nGo back to your home directory, then enter your 'projects' folder and 'game_v1'. We need to initialize this project.",
            objectives: [
                { cmd: 'cd ~', desc: "Go home (use 'cd ~' or just 'cd').", lola: "Back to safety." },
                { cmd: 'cd projects/game_v1', desc: "Go deep into the game project.", lola: "We are deep in 'game_v1'. Notice I updated your prompt location." },
                { cmd: 'git init', desc: "Initialize a new Git repository.", lola: "Excellent. You have activated the time-travel matrix for this folder." },
                { cmd: 'git add .', desc: "Stage all files.", lola: "Preparing all your (virtual) hard work for the archive." },
                { cmd: 'git commit', desc: "Commit your changes (type any message).", lola: "Checkpoint saved! You have successfully 'vibed' a save point." }
            ],
            wrapup: "Phase 2 Complete. You can save your state. If you crash the ship, we can reload. Now, how do we get new building blocks?"
        },
        {
            // PHASE 3: Packages
            title: "Phase 3: The Package Pilot",
            welcome: "You cannot build everything yourself. The universe provides. For web tech, we use **Bun** (it's 2026, after all). We need to 'install' a library for your game.\n\nType 'bun install' to pretend to download libraries.",
            objectives: [
                { cmd: 'bun install', desc: "Install project dependencies.", lola: "Downloading libraries... 'bun' is fast. 'npm' or 'pnpm' are older counterparts." },
                { cmd: 'npm run dev', desc: "Start the local development server.", lola: "Preview active! This command (often customized) spins up a local version of your app for testing." }
            ],
            wrapup: "Phase 3 Complete. You are connected to the interstellar network of reusable code. We are almost ready to start 'vibing' actual AI into existence."
        }
    ];

    // --- Core Functions ---

    function log(text, type = 'system-msg') {
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        entry.textContent = text;
        
        // Handle L.O.L.A.'s formatting separately
        if (type === 'lola-msg') {
            entry.innerHTML = `<span class="lola-msg"></span>${text.replace(/\n/g, '<br>')}`;
        }

        output.insertBefore(entry, logAnchor); // Add new logs *above* the anchor
        output.scrollTop = output.scrollHeight; // Auto-scroll to bottom
    }

    function updatePrompt() {
        const pathString = currentPath.length > 1 ? `~/${currentPath.slice(1).join('/')}` : '~';
        promptLabel.textContent = `cadet@ss_stackoverflow:${pathString}$ `;
    }

    // Helper to get nested file structure from current path
    function getDir(pathArray) {
        let dir = fileSystem;
        for (const part of pathArray) {
            if (dir[part]) {
                dir = dir[part];
            } else {
                return null;
            }
        }
        return dir;
    }

    // --- Command Parser & Simulator ---
    function processCommand(inputLine) {
        const tokens = inputLine.trim().split(/\s+/);
        const cmd = tokens[0];
        const args = tokens.slice(1);
        const currentDir = getDir(currentPath);

        log(`${promptLabel.textContent}${inputLine}`, 'cmd-echo');

        // Simple commands (navigation, file ops, help)
        if (cmd === 'help') {
            log("Available pseudo-commands: help, clear, pwd, eza, ls, cd, mkdir, touch, cat, git, bun, npm", 'help-msg');
            log(`Current Objectives (Phase ${gameState.phase + 1}):`, 'help-msg');
            gameContent[gameState.phase].objectives.forEach((obj, idx) => {
                const status = idx < gameState.currentLesson ? '[COMPLETED]' : '[OPEN]';
                log(` - ${status} ${obj.desc}`, 'help-msg');
            });
            return;
        }

        if (cmd === 'clear') {
            // Keep L.O.L.A.'s greeting but clear everything else
            const entries = output.querySelectorAll('.log-entry');
            entries.forEach(entry => entry.remove());
            initPhase(gameState.phase, true); // re-print greeting
            return;
        }

        if (cmd === 'pwd') {
            log(`/${currentPath.join('/')}`);
        }

        else if (cmd === 'eza' || cmd === 'ls') {
            if (cmd === 'ls') log("(Pseudo-tip: In 2026, vibe coders prefer 'eza' for colors/icons!)");
            let outputStr = '';
            for (const item in currentDir) {
                if (item.startsWith('.')) continue; // Simple hidden file check
                outputStr += `${item}   `;
            }
            log(outputStr);
        }

        else if (cmd === 'cd') {
            const target = args[0];
            if (!target || target === '~') {
                currentPath = ['home'];
            } else if (target === '..') {
                if (currentPath.length > 1) currentPath.pop();
            } else {
                // Handle multiple path segments e.g., projects/game_v1
                const segments = target.split('/');
                let temporaryPath = [...currentPath];
                let success = true;

                for (const seg of segments) {
                    if (seg === '..') {
                        if (temporaryPath.length > 1) temporaryPath.pop();
                    } else if (seg === '.' || seg === '') {
                        // do nothing
                    }
                    else {
                        const checkDir = getDir(temporaryPath);
                        if (checkDir && typeof checkDir[seg] === 'object' && !Array.isArray(checkDir[seg])) {
                            temporaryPath.push(seg);
                        } else {
                            log(`-bash: cd: ${target}: No such directory`, 'error-msg');
                            success = false;
                            break;
                        }
                    }
                }
                if (success) currentPath = temporaryPath;
            }
            updatePrompt();
        }

        else if (cmd === 'mkdir') {
            const name = args[0];
            if (name) {
                currentDir[name] = {};
                log(`Created virtual directory: ${name}`);
            } else {
                log("mkdir: missing operand", 'error-msg');
            }
        }

        else if (cmd === 'touch') {
            const name = args[0];
            if (name) {
                currentDir[name] = `Empty file created at ${new Date().toISOString()}`;
                log(`Created virtual file: ${name}`);
            } else {
                log("touch: missing operand", 'error-msg');
            }
        }

        else if (cmd === 'cat') {
            const name = args[0];
            if (currentDir[name]) {
                if (typeof currentDir[name] === 'string') {
                    log(currentDir[name]);
                } else {
                    log(`cat: ${name}: Is a directory`, 'error-msg');
                }
            } else {
                log(`cat: ${name}: No such file`, 'error-msg');
            }
        }

        // Simulating Phase 2/3 specific commands
        else if (cmd === 'git') {
            const sub = args[0];
            if (sub === 'init') {
                currentDir['.git'] = { 'HEAD': 'ref: refs/heads/main' };
                log("Initialized empty Git repository in simulation.");
            } else if (sub === 'add') {
                log(`Staged ${args[1] || 'all'} files.`);
            } else if (sub === 'commit') {
                log(`[main (root-commit)] ${args[1] || 'Initial commit'} - simulated.`);
            } else {
                log("git: Pseudo-command requires sub-command (init, add, commit)", 'error-msg');
            }
        }

        else if (cmd === 'bun' && args[0] === 'install') {
            log("bun install v1.1.0");
            log("✓ Installed 142 packages in 0.12s (simulated)");
        }

        else if (cmd === 'npm' && args[0] === 'run' && args[1] === 'dev') {
            log("> game_v1@0.0.1 dev");
            log("> (Simulated) Server running at http://localhost:5173/");
        }

        // Catch-all for unknown commands
        else if (cmd !== '') {
            log(`-bash: ${cmd}: command not found (Did you need 'help'?)`, 'error-msg');
        }

        // --- Game Logic Check: Did they complete the objective? ---
        checkObjective(cmd, args);
    }

    // --- Progression Logic ---

    function checkObjective(cmd, args) {
        if (gameState.gameComplete) return;

        const currentPhaseContent = gameContent[gameState.phase];
        const currentObjective = currentPhaseContent.objectives[gameState.currentLesson];

        if (!currentObjective) return; // Should not happen if game running

        // Special handling for commands with specific arguments (like 'cd projects')
        let objectiveMet = false;
        if (currentObjective.cmd.includes(' ')) {
             const objTokens = currentObjective.cmd.split(' ');
             objectiveMet = (cmd === objTokens[0] && args[0] === objTokens[1]);
        } else {
             objectiveMet = (cmd === currentObjective.cmd);
        }

        if (objectiveMet) {
            log(currentObjective.lola, 'lola-msg');
            gameState.currentLesson++;

            // Is the Phase Complete?
            if (gameState.currentLesson >= currentPhaseContent.objectives.length) {
                log(`*** ${currentPhaseContent.wrapup} ***`, 'system-msg');
                log("-----------------------------------------", 'system-msg');
                gameState.phase++;
                gameState.currentLesson = 0;

                // Is the Game Complete?
                if (gameState.phase >= gameContent.length) {
                    endGame();
                } else {
                    // Next phase
                    setTimeout(() => initPhase(gameState.phase), 1000);
                }
            }
        }
    }

    function initPhase(phaseIndex, skipGreeting=false) {
        if (!gameContent[phaseIndex]) return;

        const content = gameContent[phaseIndex];
        if (!skipGreeting) {
            log(`\n=== ${content.title.toUpperCase()} ===`, 'system-msg');
            log(content.welcome, 'lola-msg');
        }
        log(`NEXT OBJECTIVE: ${content.objectives[0].desc}`, 'highlight');
    }

    function endGame() {
        gameState.gameComplete = true;
        log("\n=========================================", 'system-msg');
        log("VICTORY! VIBE CADET STATUS: CONFIRMED.", 'system-msg');
        log("You have the functional knowledge to move around, save your state with Git, install packages, and navigate a Unix-like file system.", 'system-msg');
        log("L.O.L.A.: Your brain waves show acceptable comprehension. The SS StackOverflow will not crash today. You may now commence actual high-vibe coding in the real world.", 'lola-msg');
        log("Input is disabled. You are free.", 'system-msg');
        input.disabled = true;
        input.placeholder = "Simulation Complete.";
    }

    // --- Event Listeners ---
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const command = input.value;
            if (command.trim() !== "") {
                processCommand(command);
            }
            input.value = '';
        }
    });

    // Handle clicking anywhere on the terminal focusing the input
    document.getElementById('terminal-container').addEventListener('click', () => {
        input.focus();
    });

    // --- Start the Game! ---
    log("VibeOS Booting...", 'system-msg');
    log("Neural Link Established.", 'system-msg');
    updatePrompt();
    setTimeout(() => initPhase(0), 500);

</script>
</body>
</html>
